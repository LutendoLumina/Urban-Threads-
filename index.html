<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urban Threads</title>
    <script src="./js/theme.js"></script>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- NAVBAR SECTION -->
    <nav class="navbar">
      <div class="nav-logo">
        <a href="index.html">URBAN <em>THREADS</em></a>
      </div>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>

      <div class="nav-auth">
        <button id="theme-toggle" class="theme-btn" type="button">
          <span id="theme-icon">🌙</span>
          <span id="theme-text">Dark Mode</span>
        </button>
        <div class="nav-cart">
          <a href="cart.html" class="cart-link">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"
              ></path>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span id="cart-count">0</span>
          </a>
        </div>
        <span id="nav-user"></span>
        <button
          id="nav-signout"
          onclick="handleSignOut()"
          style="display: none"
        >
          Sign Out
        </button>
        <a id="nav-signin" href="login.html" class="btn-signin">Sign In</a>
      </div>
    </nav>

    <!-- HERO SECTION -->
    <header class="hero">
      <div class="hero-content">
        <h1>WEAR THE <span class="highlight">STREET.</span></h1>
        <p>
          Premium streetwear for everyone — built for those who lead, never
          follow.
        </p>
        <div class="hero-badge">
          <span></span> Unisex Collection — All Genders, All Styles
        </div>
        <a href="shop.html" class="hero-btn">SHOP THE COLLECTION</a>
      </div>
    </header>

    <script type="module" src="./js/auth.js"></script>
    <script type="module">
      import { initAuth, handleSignOut } from "./js/auth.js";
      initAuth({ requireAuth: false });
      window.handleSignOut = handleSignOut;
    </script>
  </body>
</html>
