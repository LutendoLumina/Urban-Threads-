<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Streetwear Studio</title>
    <script>
      (function () {
        const savedTheme = localStorage.getItem("urban-threads-theme");
        if (savedTheme === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
    <script src="https://js.stripe.com/v3/"></script>
  </head>
  <body>
    <!-- NAVBAR SECTION -->
    <nav class="navbar">
      <div class="nav-logo">
        <a href="index.html">URBAN <em>THREADS</em></a>
      </div>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>

      <div class="nav-auth">
        <button id="theme-toggle" class="theme-btn" type="button">
          <span id="theme-icon">🌙</span>
          <span id="theme-text">Dark Mode</span>
        </button>
        <div class="nav-cart">
          <a href="cart.html" class="cart-link">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"
              ></path>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span id="cart-count">0</span>
          </a>
        </div>
        <span id="nav-user"></span>
        <button
          id="nav-signout"
          onclick="handleSignOut()"
          style="display: none"
        >
          Sign Out
        </button>
        <a id="nav-signin" href="login.html" class="btn-signin">Sign In</a>
      </div>
    </nav>

    <div class="checkout-container">
      <div class="checkout-form-section">
        <h2>Shipping & Payment</h2>
        <form id="checkout-form">
          <div class="input-group">
            <input
              type="text"
              id="full-name"
              placeholder="Full Name"
              required
            />
            <input
              type="email"
              id="email"
              placeholder="Email Address"
              required
            />
          </div>
          <input
            type="text"
            id="address"
            placeholder="Shipping Address"
            required
          />

          <div id="stripe-payment-area">
            <h3>Card Details</h3>
            <div id="card-element" class="stripe-input-box"></div>
            <div id="card-errors" role="alert" class="error-msg"></div>
          </div>

          <button type="submit" id="submit-button" class="checkout-submit-btn">
            COMPLETE PURCHASE
          </button>
        </form>
      </div>

      <aside class="checkout-summary">
        <h3>ORDER SUMMARY</h3>
        <div id="checkout-items-list"></div>

        <div class="checkout-totals">
          <div class="total-row">
            <span>Total</span>
            <span id="checkout-grand-total">R0.00</span>
          </div>
        </div>
      </aside>
    </div>

    <script type="module" src="js/checkout.js"></script>
  </body>
</html>
