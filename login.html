<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urban Threads — Sign In</title>
    <script src="./js/theme.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="./css/login.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
  </head>
  <body>
    <div class="layout">
      <!-- LEFT: Brand Panel -->
      <div class="brand-panel">
        <div class="grid-overlay"></div>

        <div class="brand-logo">
          <span>URBAN <em>THREADS</em></span>
        </div>

        <div class="brand-center">
          <div class="monogram-wrap">
            <img
              class="brand-img"
              src="./assets/login-img.jpeg"
              alt="Urban Threads streetwear"
            />
          </div>
        </div>

        <div class="brand-tagline">
          <p>WEAR<br />THE <span class="highlight">STREET.</span></p>
          <p class="sub">Streetwear for everyone</p>
          <div class="unisex-badge">
            <span></span> Unisex collection — all genders, all styles
          </div>
        </div>
      </div>

      <!-- RIGHT: Form Panel -->
      <div class="form-panel">
        <div class="form-header">
          <div class="login-theme-pos">
            <button id="theme-toggle" class="theme-btn" type="button">
              <span id="theme-icon">🌙</span>
              <span id="theme-text">Dark</span>
            </button>
          </div>
          <div class="eyebrow">Urban Threads</div>
          <h1 id="form-title">WELCOME BACK</h1>
          <p id="form-subtitle">Sign in to your account to continue.</p>
        </div>

        <div class="tab-row">
          <button class="tab-btn active" onclick="switchTab('login')">
            Sign In
          </button>
          <button class="tab-btn" onclick="switchTab('signup')">
            Create Account
          </button>
        </div>

        <div class="error-msg" id="error-msg"></div>

        <!-- LOGIN -->
        <div class="form-section active" id="login-form">
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="login-email"
              placeholder="you@example.com"
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="login-password"
              placeholder="••••••••••"
            />
          </div>
          <div class="form-extras">
            <label class="remember-me">
              <input type="checkbox" /> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <button class="btn-primary" onclick="handleLogin()">SIGN IN</button>
          <div class="divider"><span>or</span></div>
          <button class="btn-google" onclick="handleGoogle()">
            <svg class="google-icon" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              />
            </svg>
            Continue with Google
          </button>
        </div>

        <!-- SIGNUP -->
        <div class="form-section" id="signup-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signup-name" placeholder="Your full name" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="signup-email"
              placeholder="you@example.com"
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="signup-password"
              placeholder="Min. 6 characters"
            />
          </div>
          <button
            class="btn-primary"
            onclick="handleSignup()"
            style="margin-top: 8px"
          >
            CREATE ACCOUNT
          </button>
          <div class="divider"><span>or</span></div>
          <button class="btn-google" onclick="handleGoogle()">
            <svg class="google-icon" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              />
            </svg>
            Continue with Google
          </button>
        </div>

        <p class="switch-text" id="switch-text">
          Don't have an account?
          <a onclick="switchTab('signup')">Sign up for free</a>
        </p>
        <div class="login-theme-wrapper"></div>
      </div>
    </div>

    <script type="module" src="./js/login.js"></script>
  </body>
</html>
