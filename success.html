<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Confirmed | Streetwear Studio</title>
    <script src="./js/theme.js"></script>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <button class="theme-toggle theme-toggle--floating" type="button" data-theme-toggle>
      <span class="theme-toggle-icon" aria-hidden="true"></span>
      <span class="theme-toggle-label" data-theme-toggle-label>Dark</span>
    </button>
    <div class="success-wrapper">
      <div class="success-card">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" width="60" height="60">
            <path
              fill="currentColor"
              d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"
            />
          </svg>
        </div>
        <h1>ORDER CONFIRMED</h1>
        <p>
          Your transaction was successful. We've sent a confirmation email to
          your inbox.
        </p>
        <div class="order-actions">
          <a href="orders.html" class="btn-primary">VIEW ORDER HISTORY</a>
          <a href="shop.html" class="btn-outline">CONTINUE SHOPPING</a>
        </div>
      </div>
    </div>
  </body>
</html>
